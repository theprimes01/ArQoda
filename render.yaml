services:
  - type: web
    name: arqoda
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arqoda-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false

databases:
  - name: arqoda-db
    databaseName: arqoda
    user: arqoda